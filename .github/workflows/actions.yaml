name: checking with a linter and jest
on: push
jobs:
  linter:
    runs-on: ubuntu-latest
    strategy:
      # Node versions list
      matrix:
        node-version: [20.x]

    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"
      - run: make install
      - run: make lint

  test:
    runs-on: ubuntu-latest
    strategy:
      # Node versions list
      matrix:
        node-version: [20.x]

    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"
      - run: make install
      - run: make test
